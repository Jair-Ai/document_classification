# Application settings, managed by Dynaconf (see app/config.py).
#
# Environment selection:
#   ENV_FOR_DYNACONF=development
#   ENV_FOR_DYNACONF=production
#
# Nested values can be overridden with environment variables:
#   MODEL_PATH=/tmp/model.joblib
#   API__MAX_DOCUMENT_LENGTH=50000
#   API__MAX_FILE_UPLOAD_BYTES=200000
#   API__MAX_REQUEST_BYTES=20000000
#   LOGGING__LEVEL=DEBUG
#   LOGGING__JSON=false
#   SECURITY__API_KEY_ENABLED=true
#   SECURITY__API_KEY=change-me

[default]
model_path = "models/document_classifier.joblib"

[default.api]
min_document_length = 1
max_document_length = 100000
max_file_upload_bytes = 400000
upload_chunk_size_bytes = 65536
multipart_overhead_bytes = 65536
max_request_bytes = 50000000
default_top_k = 3
min_top_k = 1
max_top_k = 10
max_batch_size = 100

[default.logging]
level = "INFO"
json = true
include_request_id = true

[default.security]
api_key_enabled = false
api_key = ""
api_key_header = "X-API-Key"

[development.logging]
level = "DEBUG"
json = false
include_request_id = true

[development.security]
api_key_enabled = false

[production.logging]
level = "INFO"
json = true
include_request_id = true

[production.security]
api_key_enabled = false
