name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --dev
      - name: Type check (basedpyright)
        run: uv run basedpyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --dev
      - name: Unit tests (fast)
        run: uv run pytest -m "not integration"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --dev
      - name: Audit dependencies (pip-audit)
        run: uv run pip-audit

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: document-classifier:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test (container boots and serves /health)
        run: |
          docker run -d --name classifier -p 8000:8000 document-classifier:ci
          # The image ships without the model artifact, so the app starts in
          # degraded mode: /health must still return 200 {"status":"ok",...}.
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "Health check passed:"
              curl -s http://localhost:8000/health
              exit 0
            fi
            sleep 2
          done
          echo "Health check never passed; container logs:"
          docker logs classifier
          exit 1
      - name: Stop container
        if: always()
        run: docker rm -f classifier

      # Publish only the image that just passed the smoke test, and only on
      # main. PRs (including forks, which can't read secrets) never push.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # GHCR repository names must be lowercase.
          image="ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          docker tag document-classifier:ci "$image:latest"
          docker tag document-classifier:ci "$image:${GITHUB_SHA}"
          docker push "$image:latest"
          docker push "$image:${GITHUB_SHA}"
          echo "Pushed $image:latest and $image:${GITHUB_SHA}"

  integration:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    # The real artifact/dataset may not be committed to the repo, in which
    # case the integration tests skip; this job is informational only and
    # must never block a merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --dev
      - name: Integration tests
        run: uv run pytest -m integration
